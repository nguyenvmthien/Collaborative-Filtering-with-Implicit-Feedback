project:
  name: phase2_lastfm_lastfm_artists
  random_seed: 20260316
  timezone: UTC

api:
  base_url: "https://ws.audioscrobbler.com/2.0/"
  api_key_env: "LASTFM_API_KEY"
  # Optional: put your key in config/api_key.txt (one line, no quotes). Prefer env in production.
  api_key_file: "config/api_key.txt"
  user_agent: "CSC14114-Phase2-LastFM/1.0 (+academic)"
  timeout_seconds: 30
  rate_limit_rps: 1.0
  max_retries: 6
  backoff_initial_seconds: 1.0
  backoff_max_seconds: 120.0
  jitter_seconds: 0.3
  retryable_http_statuses: [429, 500, 502, 503, 504]
  retryable_api_error_codes: [11, 16, 29]

crawl:
  friends_limit: 200
  library_limit: 200
  max_users: 20000
  target_raw_interactions_default: 1300000
  stop_after_cleaned_edges: 1000000
  cleaned_edge_check_every_users: 100
  save_state_every_n_pages: 5
  force_revalidate_cache: false
  force_refetch_completed_pages: false
  pilot_mode_max_target_raw: 4000000
  # Target ~3.5M raw edges ≈ ~500 users_library_completed (156 users → 1M; 500 users cần ~3.2–3.5M)
  target_for_500_users: 3500000
  resume_state_path: "data/raw_api/resume_state.json"
  raw_manifest_path: "data/raw_api/raw_manifest.jsonl"
  raw_edges_index_db: "data/raw_api/raw_edges_index.sqlite"
  api_call_log_path: "logs/api_calls.jsonl"
  crawl_progress_log_path: "logs/crawl_progress.jsonl"

legal:
  require_clearance_for_full_crawl: true
  clearance_file: "docs/phase2_report_assets/legal_clearance.json"
  # 6 GB để crawl tiếp đến ~500 users
  approved_quota_max_bytes: 6442450944
  approved_quota_max_requests: 500000

clean:
  # Nới lỏng k-core để giữ ≥1M interactions (đề bài: "ít nhất 1,000,000 tương tác")
  min_user_interactions: 5
  min_item_interactions: 3
  keep_playcount_metadata: true
  interactions_file: "interactions.csv"
  users_file: "users.csv"
  items_file: "items.csv"
  binary_edges_file: "interactions_binary.tsv"
  audit_file: "audit_interactions.csv"
  manifest_file: "manifest.json"
